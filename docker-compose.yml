services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ridelog-backend
    restart: unless-stopped
    volumes:
      # STOCKAGE PERSISTANT DES DONNÉES
      # ════════════════════════════════════════════════════════════════════════
      # Bind mount vers ./data sur la machine hôte
      # Contenu:
      #   - ridelog.db: Base de données SQLite (utilisateurs, véhicules, etc.)
      #   - invoices/: Factures/Reçus (si photo upload)
      #   - photos/: Photos des véhicules
      # Directement accessible dans le dossier du projet: ./data/
      - ./data:/data
    env_file:
      # ════════════════════════════════════════════════════════════════════════
      # CONFIGURATION PERSONNALISÉE
      # ════════════════════════════════════════════════════════════════════════
      # Copiez .env.example en .env et remplissez vos valeurs :
      #   cp .env.example .env
      # ⚠️  Ne committez jamais le fichier .env (il est dans .gitignore)
      # ════════════════════════════════════════════════════════════════════════
      - .env
    environment:
      # ════════════════════════════════════════════════════════════════════════
      # VARIABLES FIXES — identiques sur toutes les installations
      # ════════════════════════════════════════════════════════════════════════

      # BASE DE DONNÉES
      # DATABASE_URL: sqlite:////data/ridelog.db
      # - Chemin: /data/ridelog.db dans le container (bind mount vers ./data)
      # - 4 slashes au début car chemin absolu Unix: sqlite:/// (protocol) + /
      # - Persiste dans ./data/ sur la machine hôte
      - DATABASE_URL=sqlite:////data/ridelog.db

      # STOCKAGE DES FICHIERS (répertoires dans le volume persistant /data)
      - INVOICE_STORAGE_DIR=/data/invoices
      - PHOTO_STORAGE_DIR=/data/photos

      # PYTHON
      - PYTHONUNBUFFERED=1
    networks:
      - ridelog
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ridelog-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ridelog
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  ridelog:
    driver: bridge
    name: ridelog