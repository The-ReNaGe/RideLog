type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: 🏍️ Triumph Street Triple
    subtitle: Gestion maintenance
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        icon: mdi:alert
        icon_color: red
        content: >-
          {{ state_attr('sensor.triumph_street_triple_maintenance_en_retard',
          'count') | default(0) }} en retard
      - type: template
        icon: mdi:alert-outline
        icon_color: orange
        content: >-
          {{ state_attr('sensor.triumph_street_triple_maintenance_a_venir',
          'count') | default(0) }} à venir
  - type: custom:mushroom-title-card
    title: 🟠 Entretiens à venir
  - type: vertical-stack
    cards:
      - type: custom:mushroom-template-card
        primary: ✅ Aucun entretien à venir
        secondary: Tous les entretiens sont à jour ✨
        icon: mdi:check-circle
        icon_color: green
        card_mod:
          style: |
            :host {
              display: {{ 'block' if (state_attr('sensor.triumph_street_triple_maintenance_a_venir', 'maintenances') or []) | length == 0 else 'none' }};
            }
            ha-card {
              background: linear-gradient(135deg, rgba(76, 175, 80, 0.1) 0%, rgba(76, 175, 80, 0.05) 100%);
              border-left: 4px solid #4caf50;
              border-radius: 8px;
            }
      - type: custom:mushroom-template-card
        primary: >
          {%- set items =
          state_attr('sensor.triumph_street_triple_maintenance_a_venir',
          'maintenances') or [] -%} {{ items[0].intervention_type if items |
          length > 0 else '' }}
        secondary: >
          {%- set items =
          state_attr('sensor.triumph_street_triple_maintenance_a_venir',
          'maintenances') or [] -%} {%- if items | length > 0 -%}
            {%- set m = items[0] -%}
            {%- if m.km_remaining != 999999 -%}📏 {{ m.km_remaining }} km • {%- endif -%}
            {%- if m.days_remaining != 999999 -%}📅 {{ m.days_remaining }} j • {%- endif -%}
            💰 {{ m.estimated_cost_min }}€–{{ m.estimated_cost_max }}€
          {%- endif -%}
        icon: mdi:alert-outline
        icon_color: orange
        card_mod:
          style: |
            :host {
              display: {{ 'block' if (state_attr('sensor.triumph_street_triple_maintenance_a_venir', 'maintenances') or []) | length > 0 else 'none' }};
            }
            ha-card {
              background: linear-gradient(135deg, rgba(255, 152, 0, 0.1) 0%, rgba(255, 152, 0, 0.05) 100%);
              border-left: 4px solid #ff9800;
              border-radius: 8px;
              margin-bottom: 8px;
            }
